name: 'Inspect Classes'

on:
  workflow_dispatch: {}
  push: {}

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 'Setup JDK'
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: 'Setup Gradle'
        uses: gradle/actions/setup-gradle@v4

      - name: 'Download dependencies'
        run: ./gradlew dependencies --configuration compileClasspath

      - name: 'Inspect ItemStack'
        run: |
          JAR=$(find ~/.gradle/caches -name "minecraft-merged-deobf-26.1.jar" | head -1)
          javap -classpath "$JAR" "net.minecraft.world.item.ItemStack" | grep -E "(parse|decode|load|read|save|encode|CODEC|SINGLE)"
          echo "=== ValueOutput ==="
          javap -classpath "$JAR" "net.minecraft.world.level.storage.ValueOutput" | head -40
          echo "=== ValueInput ==="
          javap -classpath "$JAR" "net.minecraft.world.level.storage.ValueInput" | head -40
